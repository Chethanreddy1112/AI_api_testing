<!DOCTYPE html>
<html>
<head>
    <title>AI-Enhanced API Testing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI-Enhanced API Testing Tool</h1>

    <div class="card">
        <label>API URL</label>
        <input type="text" id="url" placeholder="https://jsonplaceholder.typicode.com/posts">

        <label>Method</label>
        <select id="method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
        </select>

        <label>Headers (JSON)</label>
        <textarea id="headers">{"Content-Type":"application/json"}</textarea>

        <label>Body (JSON)</label>
        <textarea id="body">{
    "title":"hello",
    "body":"testing"
}</textarea>

        <button onclick="sendRequest()">Send Request</button>
    </div>

    <div class="card">
        <h2>API Response</h2>
        <pre id="response"></pre>
    </div>

    <div class="card">
        <h2>ML Prediction</h2>
        <div id="prediction"></div>
    </div>

    <div class="card">
        <h2>AI Debugging Assistant</h2>
        <div id="ai"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
