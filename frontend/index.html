<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI-Enhanced API Testing</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="logo-container">

        <img src="10329422.png"
             alt="Project Logo"
             class="logo">

        <h1 class="project-title">
            AI-Enhanced API Testing & Development Tool
        </h1>

        <p class="subtitle">
            Smart API Testing with ML & GenAI
        </p>

    </div>

    <!-- LOGIN FORM -->

    <div id="loginForm" class="form-box">

        <h2>Login</h2>

        <input type="email"
               id="login_email"
               placeholder="Email">

        <input type="password"
               id="login_password"
               placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <button onclick="demoLogin()"
                class="demo-btn">
            Demo Login
        </button>

        <p class="demo-text">
            Demo Email: <b>demo@gmail.com</b><br>
            Password: <b>demo123</b>
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
